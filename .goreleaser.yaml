version: 2

project_name: litelog

before:
  hooks:
    - go mod tidy

builds:
  - id: litelog
    main: ./cmd/litelog/main.go
    binary: litelog
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: litelog
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: yashnaiduu
    name: Litelog
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
